<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter | Dilsan Basnet | Macondo Project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="shortcut icon" href="images/unitconverterFavicon.ico" type="image/x-icon">
</head>
<body>

    <nav>
        <div class="logo"> 🔎 UnitConverter</div>
        <div class="macondo-project">Macondo Project 🦋</div>
        <div class="name"> <img class="profile" src="images/profile.png" 
            alt="Dilsan-Profile">.Dilsan Basnet</div>
    </nav>

    <main>
        <div class="converter-card ">
            <div class="card-header">
            <h2>CONVERTER</h2> <button id="clearHistory" class="btn-text">Clear History</button>

</div>
            <div class="form-group">
            <label>Unit Name</label>
            <select id="type">
                <option value="length">Length</option>
                <option value="weight">Weight</option>
                <option value="temp">Temperature</option>
                <option value="area">Area</option>
            </select>
        </div>

<div class="grid">
    <div class="form-group">
        <label >From</label>
        <select id="fromUnit"></select>
        <input type="number" id="inputNum" value="1"
        placeholder="Enter Amount..">
    </div>

    <div class="form-group">
        <label>To</label>
        <select id="toUnit"></select>
        <div class="result-container">
        <input type="text" id="outputNum" readonly 
        placeholder="Result" >
        <button id = "copyBtn" title="Copy Result">Copy it!</button>
    </div>
    </div>
</div>

<div class="history-section">
    <h3></h3>
    <ul id="historyList">
        <li class="emplty-msg">No recent activy</li>
    </ul>
</div>
        </div>
        
</main>

    <footer>
        <p>Created By <strong>Dilsan Basnet</strong></p>
        <a href="https://github.com/DilsanBasnet" target="_blank"><i style="font-size: 30px; 
        color: black;" class="fa">&#xf09b;</i></a>
        <p><a href="https://macondo.hackclub.com/dashboard?from=fade" target="_blank">🦋 Macondo Project</p>
    </footer>
    

    <script src="script.js"></script>
</body>
</html>
